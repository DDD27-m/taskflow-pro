<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow Pro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="app-wrapper">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">Task<span>Flow</span></div>

      <nav class="sidebar-nav">
        <a class="nav-item active" href="#" data-view="dashboard">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1" y="1" width="6" height="6" rx="1"/>
            <rect x="9" y="1" width="6" height="6" rx="1"/>
            <rect x="1" y="9" width="6" height="6" rx="1"/>
            <rect x="9" y="9" width="6" height="6" rx="1"/>
          </svg>
          Dashboard
        </a>
        <a class="nav-item" href="#" data-view="my-tasks">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <polyline points="1.5,4 5,4"/><line x1="7" y1="4" x2="14.5" y2="4"/>
            <polyline points="1.5,8 5,8"/><line x1="7" y1="8" x2="14.5" y2="8"/>
            <polyline points="1.5,12 5,12"/><line x1="7" y1="12" x2="14.5" y2="12"/>
          </svg>
          My Tasks
          <span class="nav-badge" id="nb-my">0</span>
        </a>
        <a class="nav-item" href="#" data-view="upcoming">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="8" cy="8" r="6.5"/>
            <polyline points="8,4.5 8,8 10.5,10"/>
          </svg>
          Upcoming
          <span class="nav-badge" id="nb-upcoming">0</span>
        </a>

        <div class="sidebar-section">Projects</div>
        <a class="nav-item" href="#">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1.5" y="2.5" width="13" height="11" rx="1.5"/>
            <line x1="1.5" y1="6" x2="14.5" y2="6"/>
          </svg>
          Website Redesign
        </a>
        <a class="nav-item" href="#">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2 13 L8 2 L14 13 Z"/>
          </svg>
          Q2 Launch
        </a>
      </nav>

      <div class="sidebar-bottom">
        <div class="nav-item user-item">
          <div class="user-avatar">AM</div>
          Divya Dharsini D
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <div class="topbar">
        <div class="topbar-title">All Tasks</div>
        <div class="topbar-actions">
          <button class="btn" id="sort-btn">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <line x1="2" y1="5" x2="14" y2="5"/>
              <line x1="4" y1="9" x2="12" y2="9"/>
              <line x1="6" y1="13" x2="10" y2="13"/>
            </svg>
            Sort
          </button>
          <button class="btn primary" id="add-task-btn">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="8" y1="2" x2="8" y2="14"/>
              <line x1="2" y1="8" x2="14" y2="8"/>
            </svg>
            Add task
          </button>
        </div>
      </div>

      <div class="filter-bar">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="active">Active</button>
        <button class="filter-tab" data-filter="done">Completed</button>
        <div class="filter-right">
          <div class="search-box">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="6.5" cy="6.5" r="5"/>
              <line x1="10.5" y1="10.5" x2="14" y2="14"/>
            </svg>
            <input type="text" id="search-input" placeholder="Search tasks..." />
          </div>
        </div>
      </div>

      <div class="task-list" id="task-list"></div>

      <div class="stats-bar">
        <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">Total</div></div>
        <div class="stat"><div class="stat-num" id="s-active">0</div><div class="stat-label">Active</div></div>
        <div class="stat"><div class="stat-num" id="s-done">0</div><div class="stat-label">Done</div></div>
        <div class="stat"><div class="stat-num" id="s-overdue">0</div><div class="stat-label">Overdue</div></div>
      </div>
    </main>

  </div>

  <!-- Add Task Modal -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">New task</div>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="form-group">
        <label class="form-label">Task name</label>
        <input class="form-input" id="new-title" placeholder="What needs to be done?" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select class="form-input" id="new-priority">
            <option value="high">High</option>
            <option value="med" selected>Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Due date</label>
          <input class="form-input" type="date" id="new-due" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Project tag</label>
          <select class="form-input" id="new-tag">
            <option value="blue">Website Redesign</option>
            <option value="amber">Q2 Launch</option>
            <option value="green">Research</option>
            <option value="gray">General</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Assignee</label>
          <select class="form-input" id="new-assignee">
            <option>AM</option>
            <option>JL</option>
            <option>SR</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn" id="cancel-btn">Cancel</button>
        <button class="btn primary" id="save-btn">Add task</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
